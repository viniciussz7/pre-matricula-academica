server:
    port: 8080

spring:
  application:
    name: pre-matricula-academica
  datasource:
    url: jdbc:postgresql://localhost:5435/prematricula_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true