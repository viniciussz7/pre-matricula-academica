<div class="min-h-screen bg-gray-50 flex flex-col">

  <div class="bg-[#232066] p-4 flex items-center shadow-md">
    <img src="assets/logo-uesb.png" alt="Logo UESB" class="h-12 mr-4">
    <h1 class="text-white text-xl font-bold tracking-wide">PRÉ-MATRÍCULA ACADÊMICA</h1>
  </div>

  <div class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden transform transition-all">
    
    <div class="bg-[#232066] p-6 text-center">
      <h2 class="text-2xl font-bold text-white">Primeiro Acesso</h2>
      <p class="text-blue-200 mt-2 text-sm">Informe seus dados para validar o acesso</p>
    </div>

    <div class="p-8">
      <div *ngIf="successMessage" class="mb-6 p-4 bg-green-50 border-l-4 border-green-500 rounded text-green-700 flex items-start gap-3">
        <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="text-sm font-medium">{{ successMessage }}</span>
      </div>

      <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded text-red-700 flex items-start gap-3">
        <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="text-sm font-medium">{{ errorMessage }}</span>
      </div>

      <form *ngIf="!successMessage" [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-gray-700 block">E-mail</label>
          <input formControlName="email" type="email" placeholder="Digite seu e-mail"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#232066] transition-all"
            [ngClass]="{'border-red-400': form.get('email')?.invalid && form.get('email')?.touched}">
        </div>

        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-gray-700 block">Matrícula</label>
          <input formControlName="registrationNumber" type="text" placeholder="Número de matrícula"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#232066] transition-all"
            [ngClass]="{'border-red-400': form.get('enrollmentNumber')?.invalid && form.get('enrollmentNumber')?.touched}">
        </div>

        <button type="submit" [disabled]="form.invalid || isSubmitting"
          class="w-full bg-[#232066] hover:bg-[#1a1752] text-white py-3 px-4 rounded-xl font-bold tracking-wide transition-all shadow-md mt-4 disabled:opacity-60 flex justify-center items-center gap-2">
          <span *ngIf="isSubmitting" class="animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full"></span>
          Enviar
        </button>
      </form>

      <div class="mt-8 text-center">
        <a routerLink="/auth/login" class="text-sm font-medium text-gray-500 hover:text-[#232066] transition-colors inline-flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          Voltar para o Login
        </a>
      </div>
    </div>
  </div>
</div>
</div>
