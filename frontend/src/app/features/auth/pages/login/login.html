<div class="min-h-screen bg-gray-50 flex flex-col">
  
  <div class="bg-[#232066] p-4 flex items-center shadow-md">
    <img src="assets/logo-uesb.png" alt="Logo UESB" class="h-12 mr-4">
    <h1 class="text-white text-xl font-bold tracking-wide">PRÉ-MATRÍCULA ACADÊMICA</h1>
  </div>

  <div class="flex-grow flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden transform transition-all">

      <div class="bg-[#232066] p-6 text-center">
        <h2 class="text-2xl font-bold text-white">Acessar Conta</h2>
        <p class="text-blue-200 mt-2 text-sm">Insira seus dados para acessar o sistema</p>
      </div>

      <div class="p-8">
        
        <form (ngSubmit)="onLogin()" class="space-y-5">
          
          <div class="space-y-1.5">
            <label class="text-sm font-semibold text-gray-700 block">E-mail</label>
            <input [(ngModel)]="credentials.email" name="email" type="email" placeholder="Digite seu e-mail" required
              class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#232066] transition-all">
          </div>

          <div class="space-y-1.5">
            <label class="text-sm font-semibold text-gray-700 block">Senha</label>
            <input [(ngModel)]="credentials.password" name="password" type="password" placeholder="Digite sua senha" required
              class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#232066] transition-all">
          </div>

          <button type="submit"
            class="w-full bg-[#232066] hover:bg-[#1a1752] text-white py-3 px-4 rounded-xl font-bold tracking-wide transition-all shadow-md mt-4 flex justify-center items-center gap-2">
            Entrar
          </button>
        </form>

        <div class="mt-8 text-center border-t border-gray-100 pt-6">
          <p class="text-sm text-gray-500">
            Primeiro acesso? 
            <button type="button" (click)="goToFirstAccess()" class="font-bold text-[#232066] hover:text-[#1a1752] hover:underline transition-colors">
              Clique aqui
            </button>
          </p>
        </div>

      </div>
    </div>
  </div>

</div>
