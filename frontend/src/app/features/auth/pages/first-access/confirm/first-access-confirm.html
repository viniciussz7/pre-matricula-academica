<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
    
    <div class="bg-[#232066] p-6 text-center">
      <h2 class="text-2xl font-bold text-white">Confirmar Acesso</h2>
      <p class="text-blue-200 mt-1 text-sm">Informe o código e defina sua nova senha para acessar o sistema</p>
    </div>

    <div class="p-8">
      
      <div *ngIf="successMessage" class="text-center py-6">
        <div class="text-green-500 mb-4 text-5xl">✓</div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">Sucesso!</h3>
        <p class="text-gray-600 mb-6">{{ successMessage }}</p>
        
        <a routerLink="/auth/login" 
           class="block w-full bg-[#232066] text-white py-3 rounded-xl font-bold hover:bg-[#1a1752] transition-all">
           Voltar para o Login
        </a>
      </div>

      <form *ngIf="!successMessage" [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        
        <div>
          <label class="text-sm font-semibold text-gray-700">Código de Validação</label>
          <input formControlName="token" type="text" placeholder="Cole o código aqui"
            class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#232066] outline-none transition-all">
        </div>

        <div>
          <label class="text-sm font-semibold text-gray-700">Nova Senha</label>
          <input formControlName="password" type="password" placeholder="Mínimo 8 caracteres"
            class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#232066] outline-none transition-all">
        </div>

        <div>
          <label class="text-sm font-semibold text-gray-700">Confirmar Senha</label>
          <input formControlName="confirmPassword" type="password" placeholder="Repita a senha"
            class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#232066] outline-none transition-all">
          <p *ngIf="form.errors?.['passwordsMismatch'] && form.get('confirmPassword')?.touched" 
             class="text-red-500 text-xs mt-1 font-medium">As senhas não coincidem</p>
        </div>

        <div *ngIf="errorMessage" class="p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-200">
          {{ errorMessage }}
        </div>

        <button type="submit" [disabled]="form.invalid || isSubmitting" 
                class="w-full bg-[#232066] text-white py-3 mt-4 rounded-xl font-bold hover:bg-[#1a1752] disabled:opacity-50 transition-all">
          {{ isSubmitting ? 'Confirmando...' : 'Confirmar Senha' }}
        </button>
      </form>

    </div>
  </div>
</div>
