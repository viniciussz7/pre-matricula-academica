<div
  class="relative mx-auto w-full max-w-[95%] px-4 py-8"
>
  <!-- Cabeçalho -->
  <div class="mb-10 text-center">
    <h1
      class="text-2xl font-bold text-[#232066]"
    >
      Gestão de Administradores
    </h1>

    <div class="separator-line"></div>
  </div>

  <div
    class="rounded-2xl bg-white p-8 shadow-lg"
  >
    <!-- Busca e ações -->
    <div
      class="mb-6 flex flex-col items-end justify-between gap-4 md:flex-row"
    >
      <div
        class="relative w-full md:w-1/2"
      >
        <label
          class="mb-1 block text-sm font-bold text-[#232066]"
        >
          Buscar administrador:
        </label>

        <div class="relative">
          <div
            class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3"
          >
            <svg
              class="h-5 w-5 text-gray-500"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              ></path>
            </svg>
          </div>

          <input
            [(ngModel)]="searchTerm"
            (ngModelChange)="onSearch()"
            placeholder="Digite o nome ou e-mail..."
            class="w-full rounded border border-gray-300 p-2 pl-10 outline-none transition focus:ring-2 focus:ring-[#232066]"
          />
        </div>
      </div>

      <div
        class="flex flex-wrap gap-2"
      >
        <button
          type="button"
          class="flex items-center gap-2 rounded bg-[#232066] px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-[#322A6A]"
          (click)="openCreateModal()"
        >
          <svg
            class="h-4 w-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4"
            ></path>
          </svg>

          Cadastrar Administrador
        </button>

        <button
          type="button"
          [disabled]="!selectedAdmin"
          class="flex items-center gap-2 rounded bg-[#232066] px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-[#322A6A] disabled:cursor-not-allowed disabled:opacity-50"
          (click)="openUpdateModal()"
        >
          <svg
            class="h-4 w-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
            ></path>
          </svg>

          Editar Administrador
        </button>

        <button
          type="button"
          [disabled]="
            !selectedAdmin ||
            !selectedAdmin.active
          "
          class="flex items-center gap-2 rounded bg-red-600 px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-red-700 disabled:cursor-not-allowed disabled:opacity-50"
          (click)="inactivateAdmin()"
        >
          <svg
            class="h-4 w-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"
            ></path>
          </svg>

          Inativar Administrador
        </button>

        <button
          type="button"
          class="flex items-center gap-2 rounded bg-green-600 px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-green-700"
          (click)="generatePDF()"
        >
          <svg
            class="h-4 w-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            ></path>
          </svg>

          Exportar Tabela
        </button>
      </div>
    </div>

    <!-- Erro -->
    <div
      *ngIf="errorMessage"
      class="mb-6 rounded-lg border border-red-200 bg-red-50 p-4 text-sm font-medium text-red-700"
    >
      {{ errorMessage }}
    </div>

    <!-- Carregamento -->
    <div
      *ngIf="isLoading"
      class="flex min-h-52 items-center justify-center"
    >
      <div
        class="h-10 w-10 animate-spin rounded-full border-4 border-gray-200 border-t-[#232066]"
      ></div>
    </div>

    <!-- Tabela -->
    <div
      *ngIf="!isLoading"
      class="overflow-x-auto rounded border border-gray-200"
    >
      <table
        class="w-full border-collapse"
      >
        <thead>
          <tr
            class="bg-[#232066] text-white"
          >
            <th class="w-2/5 p-3 text-left">
              Nome
            </th>

            <th class="w-2/5 p-3 text-left">
              E-mail
            </th>

            <th class="w-1/5 p-3 text-center">
              Status
            </th>
          </tr>
        </thead>

        <tbody>
          <tr
            *ngFor="let admin of filteredAdmins"
            class="cursor-pointer border-b text-[#232066] transition-colors hover:bg-[#322A6A] hover:text-white"
            [class.bg-[#232066]]="
              selectedAdmin?.id === admin.id
            "
            [class.text-white]="
              selectedAdmin?.id === admin.id
            "
            [class.bg-gray-100]="
              !admin.active &&
              selectedAdmin?.id !== admin.id
            "
            [class.opacity-60]="
              !admin.active &&
              selectedAdmin?.id !== admin.id
            "
            (click)="selectAdmin(admin)"
          >
            <td class="p-3 font-medium">
              {{ admin.fullName }}
            </td>

            <td class="p-3">
              {{ admin.email }}
            </td>

            <td class="p-3 text-center">
              <span
                *ngIf="admin.active"
                class="rounded bg-green-100 px-2 py-1 text-xs font-bold text-green-800"
              >
                Ativo
              </span>

              <span
                *ngIf="!admin.active"
                class="rounded bg-red-100 px-2 py-1 text-xs font-bold text-red-800"
              >
                Inativo
              </span>
            </td>
          </tr>

          <tr
            *ngIf="
              filteredAdmins.length === 0
            "
          >
            <td
              colspan="3"
              class="p-6 text-center text-gray-500"
            >
              Nenhum administrador encontrado.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <app-admin-modal
    *ngIf="isModalOpen"
    [adminToEdit]="selectedAdmin"
    (closeModal)="isModalOpen = false"
    (saveSuccess)="onModalSuccess()"
  >
  </app-admin-modal>
</div>
